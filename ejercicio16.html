<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora | JS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Calculadora Web</h1>
        <p class="subtitulo">Operaciones básicas utilizando Funciones Flecha.</p>

        <form id="form-calculadora" onsubmit="return false;">
            
            <div class="grupo-formulario">
                <label for="numero1">Primer Número :</label>
                <input type="text" id="numero1" placeholder="Ej: 12" required>
            </div>

            <div class="grupo-formulario">
                <label for="numero2">Segundo Número :</label>
                <input type="text" id="numero2" placeholder="Ej: 5" required>
            </div>

            <div class="grupo-formulario" style="display: flex; gap: 10px; justify-content: space-between;">
                <button type="button" class="boton-enviar" onclick="calcularOperacion('suma')" style="padding: 10px;">+</button>
                <button type="button" class="boton-enviar" onclick="calcularOperacion('resta')" style="padding: 10px;">-</button>
                <button type="button" class="boton-enviar" onclick="calcularOperacion('multiplicacion')" style="padding: 10px;">×</button>
                <button type="button" class="boton-enviar" onclick="calcularOperacion('division')" style="padding: 10px;">÷</button>
            </div>

            <div class="grupo-formulario" style="margin-top: 25px;">
                <label for="resultado">Resultado :</label>
                <input type="text" id="resultado" placeholder="El resultado aparecerá aquí" readonly>
            </div>

        </form>
    </div>

    <script src="js/ejercicio16.js"></script>
</body>
</html>
