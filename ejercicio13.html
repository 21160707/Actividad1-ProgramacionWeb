<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de edad para votar | JS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Verificación de edad para votar</h1>
        <p class="subtitulo">Ingresa tu edad para verificar si puedes votar.</p>

        <form id="form-verificacion" onsubmit="return false;">
            
            <div class="grupo-formulario">
                <label for="edad">Edad :</label>
                <input type="number" id="edad" step="1" placeholder="Ej: 25" required>
            </div>

            <button type="button" id="btn-verificar" class="boton-enviar">
                Verificar
            </button>

            <div class="grupo-formulario" style="margin-top: 20px;">
                <input type="text" id="resultado" placeholder="Resultado" readonly>
            </div>

        </form>
    </div>

    <script src="js/ejercicio13.js"></script>
</body>
</html>
