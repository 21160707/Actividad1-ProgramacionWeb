<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Tareas | JS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="contenedor-formulario ancho-gestor">
        <h1>Gestor de Tareas</h1>
        <p class="subtitulo">Tus pendientes guardados de forma persistente (JSON & LocalStorage).</p>

        <form id="form-tareas" onsubmit="return false;">
            
            <div class="grupo-formulario">
                <label for="nueva-tarea">¿Qué tienes pendiente hoy? :</label>
                <input type="text" id="nueva-tarea" placeholder="Ej: Estudiar para programación web" required>
            </div>

            <button type="button" id="btn-agregar" class="boton-enviar separador-boton">
                Agregar Tarea
            </button>

            <div class="grupo-formulario">
                <label>Lista de Pendientes :</label>
                <div id="lista-tareas" class="lista-scroll">
                    </div>
            </div>

        </form>
    </div>

    <script src="js/ejercicio17.js"></script>
</body>
</html>
