<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetos en JavaScript | JS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Objetos en JavaScript</h1>
        <p class="subtitulo">Ingresa el nombre y calificación del alumno.</p>

        <form id="form-verificacion" onsubmit="return false;">
            
            <div class="grupo-formulario">
                <label for="nombre">Nombre del alumno :</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="grupo-formulario">
                <label for="calificacion">Calificación :</label>
                <input type="number" id="calificacion" placeholder="Ej: 8.5" step="0.1" min="0" max="10" required>
            </div>

            <button type="button" id="btn-calcular" class="boton-enviar">
                Calcular
            </button>

            <div class="grupo-formulario" style="margin-top: 20px;">
                <input type="text" id="resultado" placeholder="Resultado" readonly>
            </div>

        </form>
    </div>

    <script src="js/ejercicio15.js"></script>
</body>
</html>
