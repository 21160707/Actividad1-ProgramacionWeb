<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objetos en JavaScript | JS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/ejercicio10.css">
</head>
<body>

    <div class="contenedor-formulario">
        <h1>Objetos en JavaScript</h1>
        <p class="subtitulo">Ingresa la lista de alumnos y sus calificaciones (un alumno por línea).</p>
        <form id="form-verificacion" onsubmit="return false;">
            
            <div class="grupo-formulario">
                <label for="datos-alumnos">Lista de Alumnos y Calificaciones :</label>
                <textarea id="datos-alumnos" rows="6" placeholder="Juan Pérez, 8.5&#10;Maria López, 9.2&#10;Pedro Gómez, 6.0" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; resize: vertical;" required></textarea>
            </div>

            <button type="button" id="btn-calcular" class="boton-enviar">
                Calcular Estadísticas
            </button>

            <div class="grupo-formulario" style="margin-top: 20px;">
                <label>Resultados del Análisis:</label>
                <textarea id="resultado" rows="4" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; background-color: #f9f9f9; resize: none;" readonly placeholder="Aquí aparecerán las estadísticas..."></textarea>
            </div>

        </form>
    </div>

    <script src="js/ejercicio15.js"></script>
</body>
</html>
